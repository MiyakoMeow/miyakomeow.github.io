version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 20
    versioning-strategy: "increase"
    commit-message:
      prefix: "chore"
      include: "scope"
    reviewers:
      - "MiyakoMeow"
    assignees:
      - "MiyakoMeow"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "09:00"
    labels:
      - "dependencies"
      - "automated"
    open-pull-requests-limit: 20
